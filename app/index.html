<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Bear Family Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --primary:#004A98; --primary-hover:#003A78; --accent:#B4CEFF; --accent-soft:#E4EEFF;
  --canvas:#FFFFFF; --muted:#E6E5E5; --field:#F7F9FC; --ink:#1A2B44; --ink-soft:#6B7A90;
  --shadow-soft:0 2px 12px rgba(0,74,152,.06);
  --shadow-lift:0 8px 28px rgba(0,74,152,.12);
  --shadow-hero:0 24px 64px rgba(0,74,152,.22), 0 4px 16px rgba(0,74,152,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:Poppins,Futura,"Century Gothic",-apple-system,sans-serif;background:var(--field);
  color:var(--ink);font-size:15px;line-height:24px;overflow:hidden;
  touch-action:none;-webkit-text-size-adjust:100%;} /* the page never zooms — only the tree does */
#sheet,#login{touch-action:pan-y;}
button{font:inherit;border:0;background:none;cursor:pointer;color:inherit;}
input,select,textarea{font:inherit;color:var(--ink);}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}

/* ---------- login ---------- */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(170deg,#DCE9FC 0%,#E9F1FD 55%,#F7F9FC 100%);z-index:50;}
#login .card{background:#fff;border-radius:32px;box-shadow:var(--shadow-hero);padding:36px 28px;
  width:100%;max-width:400px;text-align:center;}
#login .bear{width:76px;height:76px;border-radius:20px;background:var(--accent-soft);
  display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 16px;}
#login h1{font-size:24px;line-height:32px;font-weight:600;margin-bottom:4px;}
#login .cap{font-size:12px;line-height:16px;color:var(--ink-soft);margin-bottom:22px;}
.choice{display:flex;align-items:center;gap:12px;background:var(--field);border-radius:16px;
  padding:12px 16px;margin-bottom:10px;width:100%;text-align:left;font-size:14px;font-weight:500;
  transition:background .15s cubic-bezier(.4,0,.2,1);}
.choice:hover{background:var(--accent-soft);}
.choice .itile{width:38px;height:38px;border-radius:12px;background:var(--accent-soft);
  color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:16px;flex:none;font-weight:600;}
.choice .sub{display:block;font-size:11px;font-weight:400;color:var(--ink-soft);line-height:15px;}

/* ---------- app bar ---------- */
#app{position:fixed;inset:0;display:none;flex-direction:column;}
#appbar{background:#fff;border-bottom:1px solid var(--muted);display:flex;align-items:center;
  gap:10px;padding:10px 16px;flex-wrap:wrap;z-index:20;}
#appbar .bear{width:40px;height:40px;border-radius:12px;background:var(--accent-soft);
  display:flex;align-items:center;justify-content:center;font-size:19px;flex:none;}
#treename{font-weight:600;font-size:16px;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis;}
.iconbtn{width:34px;height:34px;border-radius:10px;background:var(--accent-soft);color:var(--primary);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;flex:none;}
.chip{background:var(--accent-soft);color:var(--primary);border-radius:999px;padding:7px 14px;
  font-size:13px;font-weight:500;white-space:nowrap;}
#searchwrap{position:relative;flex:1;min-width:130px;max-width:280px;}
#search{width:100%;background:var(--field);border-radius:999px;border:0;outline:0;
  padding:9px 18px;font-size:13px;color:var(--ink);}
#search::placeholder{color:var(--ink-soft);}
#search:focus{box-shadow:0 0 0 2px var(--accent);}
#results{position:absolute;top:42px;left:0;right:0;background:#fff;border-radius:16px;
  box-shadow:var(--shadow-lift);padding:6px;display:none;z-index:40;max-height:260px;overflow:auto;}
#results button{display:flex;width:100%;text-align:left;gap:10px;align-items:center;
  padding:8px 10px;border-radius:12px;font-size:13px;}
#results button:hover{background:var(--field);}
#results .rn{font-weight:500;} #results .rf{font-size:11px;color:var(--ink-soft);}

/* ---------- canvas ---------- */
#viewport{flex:1;position:relative;overflow:hidden;touch-action:none;cursor:grab;}
#viewport.dragging{cursor:grabbing;}
#world{position:absolute;left:0;top:0;transform-origin:0 0;}
#edges{position:absolute;left:0;top:0;pointer-events:none;}
.node{position:absolute;width:120px;text-align:center;cursor:pointer;
  transition:left .55s cubic-bezier(.4,0,.2,1),top .55s cubic-bezier(.4,0,.2,1),
    opacity .45s cubic-bezier(.4,0,.2,1);}
.node.spawn{opacity:0;}
#edges{transition:opacity .3s cubic-bezier(.4,0,.2,1);}
.addfab{position:absolute;top:-6px;left:16px;width:26px;height:26px;border-radius:50%;
  background:var(--primary);color:#fff;font-size:15px;font-weight:500;line-height:1;
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-lift);
  opacity:0;transform:scale(.7);pointer-events:none;z-index:3;border:0;cursor:pointer;
  transition:opacity .15s cubic-bezier(.4,0,.2,1),transform .15s cubic-bezier(.4,0,.2,1);}
.node:hover .addfab,.node.selected .addfab{opacity:1;transform:scale(1);pointer-events:auto;}
.avatar{width:64px;height:64px;border-radius:50%;background:var(--accent-soft);color:var(--primary);
  font-weight:600;font-size:18px;position:relative;display:flex;align-items:center;justify-content:center;
  margin:0 auto 6px;box-shadow:var(--shadow-soft);}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.flagpip{position:absolute;top:-4px;right:-4px;width:22px;height:22px;border-radius:50%;background:#fff;
  box-shadow:var(--shadow-soft);font-size:11px;line-height:1;display:flex;align-items:center;justify-content:center;}
.node .nick{font-size:13px;line-height:18px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.node .full{font-size:11px;line-height:15px;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.node .passedon{font-size:10px;line-height:13px;color:var(--ink-soft);margin-top:2px;}
.node.passed .avatar{filter:grayscale(1);opacity:.82;box-shadow:none;outline:1px solid var(--muted);}
.node.passed .nick{color:var(--ink-soft);}
.node.exdim{opacity:.7;} /* married-in ex: still around, visibly not core family */
.node.you .avatar{outline:3px solid var(--primary);outline-offset:3px;
  box-shadow:0 0 0 10px rgba(180,206,255,.5),0 10px 30px rgba(0,74,152,.28);}
.youchip{display:inline-block;margin-top:3px;background:var(--primary);color:#fff;border-radius:999px;
  font-size:10px;font-weight:500;padding:2px 10px;}
.xchip{position:absolute;transform:translateX(-50%);background:var(--accent-soft);color:var(--primary);
  border-radius:999px;padding:5px 12px;font-size:11px;font-weight:500;white-space:nowrap;cursor:pointer;
  box-shadow:none;}
.xchip.ghost{background:#fff;outline:1px solid var(--muted);color:var(--ink-soft);}
#focusbar{position:absolute;left:14px;top:12px;display:none;gap:8px;z-index:10;}
#focusbar .on{background:var(--primary);color:#fff;border-radius:999px;padding:7px 14px;font-size:12px;font-weight:500;}
#focusbar .off{background:#fff;color:var(--ink-soft);border-radius:999px;padding:7px 14px;font-size:12px;
  font-weight:500;outline:1px solid var(--muted);}
#navhint{position:absolute;left:16px;bottom:12px;font-size:11px;color:var(--ink-soft);pointer-events:none;}
#minimap{position:absolute;right:14px;bottom:14px;background:#fff;border-radius:12px;
  box-shadow:var(--shadow-soft);width:150px;height:100px;display:none;cursor:pointer;overflow:hidden;}
#minimap .dot{position:absolute;width:7px;height:7px;border-radius:2px;background:var(--muted);}
#minimap .dot.me{background:var(--primary);}
#minimap .vp{position:absolute;border:1.5px solid var(--primary);border-radius:4px;pointer-events:none;}

/* ---------- sheet ---------- */
#scrim{position:fixed;inset:0;background:rgba(26,43,68,.35);display:none;z-index:30;}
#sheet{position:fixed;left:50%;bottom:0;transform:translate(-50%,105%);width:100%;max-width:520px;
  background:#fff;border-radius:24px 24px 0 0;box-shadow:var(--shadow-lift);z-index:31;
  max-height:93dvh;overflow-y:auto;padding:10px 20px calc(24px + env(safe-area-inset-bottom));
  transition:transform .25s cubic-bezier(.4,0,.2,1);}
#sheet.open{transform:translate(-50%,0);}
.handle{width:36px;height:4px;border-radius:999px;background:var(--muted);margin:0 auto 16px;}
.profile{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.profile .avatar{width:76px;height:76px;margin:0;font-size:22px;flex:none;}
.profile h3{font-size:18px;line-height:26px;font-weight:600;}
.cap2{font-size:12px;line-height:17px;color:var(--ink-soft);}
.card{background:var(--field);border-radius:16px;padding:14px 16px;margin-bottom:12px;}
.card .label{font-size:11px;font-weight:500;color:var(--ink-soft);letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:6px;}
.nickrow{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:7px 0;}
.nickrow + .nickrow{border-top:1px solid var(--muted);}
.nickrow .nickname{font-size:15px;font-weight:500;}
.nickrow .who{font-size:12px;color:var(--ink-soft);text-align:right;}
.bignick{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.bignick input{flex:1;background:#fff;border:0;outline:0;border-radius:12px;padding:8px 14px;
  font-size:20px;font-weight:600;color:var(--primary);min-width:0;}
.bignick input:focus{box-shadow:0 0 0 2px var(--accent);}
.link{color:var(--primary);font-size:13px;font-weight:500;cursor:pointer;}
.btnrow{display:flex;gap:10px;margin-top:14px;}
.btn{flex:1;height:46px;border-radius:999px;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:500;transition:background .15s;}
.btn.primary{background:var(--primary);color:#fff;}
.btn.primary:hover{background:var(--primary-hover);}
.btn.secondary{background:var(--accent-soft);color:var(--primary);}
.fld{background:var(--field);border-radius:14px;padding:9px 14px;margin-bottom:10px;}
.fld .flabel{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);margin-bottom:1px;}
.fld input,.fld select,.fld textarea{width:100%;background:transparent;border:0;outline:0;font-size:14px;padding:2px 0;}
.fld input:disabled,.fld select:disabled,.fld textarea:disabled{color:var(--ink-soft);}
.photorow{display:flex;gap:12px;justify-content:space-between;}
.pslot{flex:1;text-align:center;}
.pslot .ph{width:72px;height:72px;border-radius:50%;background:#fff;margin:0 auto 5px;position:relative;
  display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:20px;cursor:pointer;
  box-shadow:var(--shadow-soft);}
.pslot .ph img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pslot .ph.main{outline:2px solid var(--primary);outline-offset:2px;}
.pslot .pl{font-size:10px;line-height:13px;font-weight:500;color:var(--ink-soft);}
.pslot .star{font-size:11px;color:var(--ink-soft);cursor:pointer;margin-top:2px;display:inline-block;}
.pslot .star.on{color:var(--primary);font-weight:600;}
.grouphdr{font-size:11px;font-weight:500;color:var(--ink-soft);letter-spacing:.06em;text-transform:uppercase;margin:14px 0 6px;}
.viewonly{background:var(--accent-soft);border-radius:12px;padding:8px 14px;font-size:12px;
  color:var(--primary);margin-bottom:12px;}
#toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,80px);background:var(--ink);color:#fff;
  border-radius:999px;padding:9px 20px;font-size:13px;font-weight:500;z-index:60;opacity:0;
  transition:all .25s cubic-bezier(.4,0,.2,1);pointer-events:none;max-width:88vw;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;}
#toast.show{transform:translate(-50%,0);opacity:1;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
</style>
</head>
<body>

<div id="login"></div>

<div id="app">
  <div id="appbar">
    <div class="bear">🐻</div>
    <div id="treename" title="tap ✎ to rename">BearFamily</div>
    <button class="iconbtn" id="renameBtn" title="rename your tree">✎</button>
    <div id="searchwrap">
      <input id="search" placeholder="search the family…" autocomplete="off">
      <div id="results"></div>
    </div>
    <button class="chip" id="viewingBtn">viewing as …</button>
    <button class="iconbtn" id="zoomOut">−</button>
    <button class="iconbtn" id="zoomIn">+</button>
    <button class="chip" id="homeBtn">◎ me</button>
    <button class="iconbtn" id="tutBtn" title="tutorial">🎓</button>
    <button class="iconbtn" id="adminBtn" title="super settings" style="display:none;">⭐</button>
  </div>
  <div id="viewport">
    <div id="world"><svg id="edges"></svg><div id="nodes"></div></div>
    <div id="focusbar"><span class="on" id="focuslabel"></span><button class="off" id="showall">back to my view</button></div>
    <div id="navhint">click a person for ＋ add · double-click to open · drag to pan · scroll to zoom</div>
    <div id="minimap"></div>
  </div>
</div>

<div id="scrim"></div>
<div id="sheet"><div class="handle"></div><div id="sheetbody"></div></div>
<div id="toast"></div>
<input type="file" id="fileinput" accept="image/*" style="display:none">

function partnerRelOf(a,b){ return S.rels.find(r=>r.kind==='pt'&&
  ((r.a===a&&r.b===b)||(r.a===b&&r.b===a))); }
function relStatus(a,b){ const r=partnerRelOf(a,b); return (r&&r.status)||'together'; }

/* screen-space animation correction (FLIP): after a relayout + view shift,

  for(const el of nodesEl.querySelectorAll('.node')){
    const pid=el.dataset.pid, op=oldPos[pid];

    el.style.left=(tx-NODE_W/2)+'px'; el.style.top=ty+'px'; } }

/* ================= layout =================
   Deterministic hierarchical layout:
   - siblings ordered oldest → youngest, left → right
   - couples: husband left, wife right (gender), or the couple's own

   - in-law parents (satellite roots) hang beside their child

function bornVal(pid){ const b=parseInt(person(pid).born); return isNaN(b)?9999:b; }
function computeLayout(vis){
  const gens=new Map(); gens.set(viewing(),0);
  let front=[viewing()];
  while(front.length){ const nxt=[];
    for(const f of front){ const g=gens.get(f);
      for(const p of parentsOf(f)) if(vis.has(p)&&!gens.has(p)){gens.set(p,g+1);nxt.push(p);}
      for(const c of childrenOf(f)) if(vis.has(c)&&!gens.has(c)){gens.set(c,g-1);nxt.push(c);}
      for(const pt of partnersOf(f)) if(vis.has(pt)&&!gens.has(pt)){gens.set(pt,g);nxt.push(pt);}
      for(const s of siblingsOf(f)) if(vis.has(s)&&!gens.has(s)){gens.set(s,g);nxt.push(s);} }
    front=nxt; }

    const cands=partnersOf(pid).filter(x=>vis.has(x)&&gens.get(x)===gens.get(pid)&&!unitOf[x]);
    return cands.find(x=>isCurrent(relStatus(pid,x)))

    members.forEach(m=>unitOf[m]=u); units.push(u); };

  // marriages the first wife pairs and later wives stand beside

  // a child prefers hanging under the unit holding BOTH parents; if the
  // parents split (divorce + remarriage), the lone ex-parent wins over
  // the parent who re-coupled, so the child stays under their own line
  for(const u of units){ const cands=[];

      for(const pu of pus){

      if(done)break; } }

    const cw=u.children.reduce((s,c)=>s+width(c),0)+Math.max(0,u.children.length-1)*SIB_GAP;
    return u._cw=Math.max(unitW(u),cw); }
  function width(u){ if(u._w)return u._w;
    return u._w=coreWidth(u)+u.attach.reduce((s,a)=>s+width(a.unit)+40,0); }
  function place(u,left){
    for(const a of u.attach.filter(a=>a.side==='left')){ place(a.unit,left); left+=width(a.unit)+40; }
    const cw=coreWidth(u);
    if(u.children.length){
      const kidsW=u.children.reduce((s,c)=>s+width(c),0)+(u.children.length-1)*SIB_GAP;
      let cx=left+(cw-kidsW)/2;
      for(const c of u.children){ place(c,cx); cx+=width(c)+SIB_GAP; }
      u.x=(u.children[0].x+u.children[u.children.length-1].x)/2; }
    else u.x=left+cw/2;
    let x=left+cw;
    for(const a of u.attach.filter(a=>a.side==='right')){ place(a.unit,x+40); x+=40+width(a.unit); }
    u.placed=true; }
  // ---- roots: main lineage first, then satellites beside their child ----
  // placeClear keeps each subtree an intact block: if it would overlap an
  // already-placed subtree in ANY row, the WHOLE subtree slides aside —
  // separate family lines never interleave
  function subUnitsOf(r){ const arr=[]; (function c(u){arr.push(u);
    u.children.forEach(c); u.attach.forEach(a=>c(a.unit));})(r); return arr; }
  function placeClear(r,left,dir){ place(r,left);
    const sub=new Set(subUnitsOf(r));
    for(let it=0;it<12;it++){ let shift=0;
      for(const s of sub){ for(const p of units){
        if(sub.has(p)||!p.placed||p.g!==s.g)continue;
        const sl=s.x-unitW(s)/2, sr=s.x+unitW(s)/2, pl=p.x-unitW(p)/2, pr=p.x+unitW(p)/2;
        if(sl<pr+SIB_GAP&&sr>pl-SIB_GAP){
          const need=dir>0?(pr+SIB_GAP-sl):(sr-(pl-SIB_GAP));
          if(need>shift)shift=need; } } }
      if(shift<=0)break;
      for(const s of sub)s.x+=dir*shift; } }
  place(mainU,0);
  const roots=units.filter(u=>!u.parent&&!u.placed&&!u.attachedTo);
  const anchorX=r=>{ const au=r.secAnchor.unit;
    return au.members.length>1
      ?(au.members[0]===r.secAnchor.via?au.x-COUPLE/2:au.x+COUPLE/2):au.x; };
  let guard=0;
  while(roots.some(r=>!r.placed)&&guard++<20){
    const ready=roots.filter(r=>!r.placed&&r.secAnchor&&r.secAnchor.unit.placed);
    if(ready.length){ // nearest-to-centre anchors place first, left→right —
      // each side fans outward in kinship order (viewer's maternal side ends
      // by the couple's middle; the partner's side mirrors on the right) and
      // blocks can never leapfrog into each other
      ready.sort((a,b)=>anchorX(a)-anchorX(b));
      // centre each married-in family directly over their own child —
      // never drifting over the child's partner (placeClear slides it
      // aside only if the spot is taken)
      for(const r of ready)placeClear(r,anchorX(r)-width(r)/2,1); }
    else { const r=roots.find(x=>!x.placed);
      const maxX=Math.max(0,...units.filter(u=>u.placed).map(u=>u.x+unitW(u)/2));
      placeClear(r,maxX+120,1); } }
  // ---- per-row de-overlap sweep (residual safety only) ----
  const byRow=new Map();
  for(const u of units){ if(!byRow.has(u.g))byRow.set(u.g,[]); byRow.get(u.g).push(u); }
  for(const row of byRow.values()){ row.sort((a,b)=>a.x-b.x);
    for(let i=1;i<row.length;i++){ const prev=row[i-1],cur=row[i];
      const minX=prev.x+unitW(prev)/2+SIB_GAP+unitW(cur)/2;
      if(cur.x<minX)cur.x=minX; } }
  // ---- emit positions ----
  const genVals=[...new Set(units.map(u=>u.g))].sort((a,b)=>b-a);
  const gmax=genVals[0];
  const pos={}; let minX=Infinity,maxX=-Infinity;

    if(u.members.length===1){ pos[u.members[0]]={x:u.x,y}; }
    else { pos[u.members[0]]={x:u.x-COUPLE/2,y}; pos[u.members[1]]={x:u.x+COUPLE/2,y}; }
    minX=Math.min(minX,u.x-unitW(u)/2); maxX=Math.max(maxX,u.x+unitW(u)/2); }
  const off=PAD-minX;
  for(const k in pos)pos[k].x+=off;
  const w=maxX-minX+PAD*2, h=genVals.length*ROW_H+PAD+120;
  layout={pos,gens,bounds:{w:Math.max(w,600),h:Math.max(h,400)},unitOf};
}

const vp=document.getElementById('viewport');

(function(){
  const pointers=new Map(); let last=null,pinchD=0;
  vp.addEventListener('pointerdown',e=>{ if(e.target.closest('.xchip')||e.target.closest('#focusbar')||e.target.closest('#minimap'))return;
    // NOTE: no setPointerCapture here — capturing on press retargets the
    // click/dblclick to the canvas and node taps never fire. We capture
    // only once a real drag begins (in pointermove).
    pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    dragMoved=false;
    if(pointers.size===1)last={x:e.clientX,y:e.clientY};
    if(pointers.size===2){ const pts=[...pointers.values()]; pinchD=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y); }
    vp.classList.add('dragging'); });
  vp.addEventListener('pointermove',e=>{ if(!pointers.has(e.pointerId))return;
    pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pointers.size===1&&last){ const dx=e.clientX-last.x,dy=e.clientY-last.y;
      if(!dragMoved&&Math.abs(dx)+Math.abs(dy)>4){ dragMoved=true;
        try{vp.setPointerCapture(e.pointerId);}catch(_){}}
      view.tx+=dx; view.ty+=dy; last={x:e.clientX,y:e.clientY}; applyView(); }
    else if(pointers.size===2){ const pts=[...pointers.values()];
      const d=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
      const mid={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
      if(pinchD>0)zoomAt(mid.x,mid.y,d/pinchD);
      pinchD=d;
      if(!dragMoved){ dragMoved=true; try{vp.setPointerCapture(e.pointerId);}catch(_){}} } });
  const up=e=>{ pointers.delete(e.pointerId); last=null; pinchD=0; vp.classList.remove('dragging');
    setTimeout(()=>dragMoved=false,50); };

  img.onload=()=>{ const max=384; let w=img.width,h=img.height;

function revealPath(target){ let vis=computeVisible(); if(vis.has(target))return;
  // BFS path from viewer to target over the full graph
  const prev={}; const seen=new Set([viewing()]); let front=[viewing()];
  outer: while(front.length){ const nxt=[];
    for(const f of front) for(const n of neighborsOf(f)) if(!seen.has(n)){
      seen.add(n); prev[n]=f; nxt.push(n); if(n===target)break outer; }
    front=nxt; }
  if(!(target in prev))return;
  const path=[target]; let c=target; while(prev[c]){c=prev[c];path.unshift(c);}
  for(let i=0;i<path.length-1;i++){ const A=path[i],B=path[i+1];
    vis=computeVisible(); if(vis.has(B))continue;
    if(parentsOf(A).includes(B)||siblingsOf(A).includes(B))addExpansionSilent('side',A);
    else addExpansionSilent('family',A); }
  save(); rebuild(); updateFocusBar(displayName(target)); }
function addExpansionSilent(kind,pid){ computeVisible(); const key=kind+':'+pid;
  let e=S.history.find(x=>expKey(x)===key);
  if(!e){e={kind,pid,from:revealedBy.get(pid)||'nucleus'};S.history.push(e);}
  if(kind==='side'){ const partnerSides=partnersOf(pid).map(x=>'side:'+x);
    S.active=S.active.filter(k=>!partnerSides.includes(k)); }
  if(!S.active.includes(key))S.active.push(key); }

        <span>${esc(p.name)}<span class="sub">${p.born?('b. '+esc(p.born)):'unclaimed'}</span></span></button>`).join('')||'<div class="cap">nobody unclaimed yet</div>'}
    </div>
    <div class="fld" style="text-align:left;margin-top:10px;"><span class="flabel">or add yourself — full name</span><input id="wa_name"></div>
    <button class="btn primary" style="width:100%;" id="wa_new">Add me</button>`);
  document.querySelectorAll('[data-claim]').forEach(b=>b.onclick=async()=>{
    const pid=b.dataset.claim;
    const {error}=await sb.rpc('claim_person',{p:pid});
    if(error){toast((error.message||'claim failed').toLowerCase());return;}
    S.persons[pid].claimedBy=ME.nucleusId; startSession(ME.nucleusId,pid); });
  document.getElementById('wa_new').onclick=async()=>{
    const name=document.getElementById('wa_name').value.trim();
    if(!name){toast('your name is needed');return;}
    const id=crypto.randomUUID();
    const {error}=await sb.from('person').insert({id,tree_id:ME.treeId,full_name:name,claimed_by:ME.nucleusId});
    if(error){toast((error.message||'failed').toLowerCase());return;}
    await cloudFetchAll(); startSession(ME.nucleusId,id); }; }
function pickProfile(nid,mems){ const el=document.getElementById('login');
  el.querySelector('.card').innerHTML=`<div class="bear">🐻</div>
    <h1>Who's looking?</h1><div class="cap">nicknames are personal — pick yourself</div>
    ${mems.map(m=>`<button class="choice" data-p="${m}"><span class="itile">${person(m).name.split(' ').map(w=>w[0]).slice(0,2).join('')}</span>
      <span>${esc(person(m).name)}</span></button>`).join('')}`;
  el.querySelectorAll('.choice').forEach(b=>b.onclick=()=>startSession(nid,b.dataset.p)); }
function startSession(nid,pid){ S.session={nucleusId:nid,viewingAs:pid};
  S.history=[];S.active=[]; ensureDefaults(); save(); enterApp(); }
document.getElementById('viewingBtn').onclick=()=>{
  const mems=nucleusMembers(S.session.nucleusId);
  if(mems.length<2){toast('only you on this login');return;}
  const i=(mems.indexOf(viewing())+1)%mems.length;
  S.session.viewingAs=mems[i]; S.history=[];S.active=[]; ensureDefaults(); save();
  document.getElementById('viewingBtn').textContent='viewing as '+person(viewing()).name.split(' ')[0];
  closeSheet(); rebuild(); centerOn(viewing()); lastFocusLabel=''; updateFocusBar();
  toast('viewing as '+person(viewing()).name.split(' ')[0]); };

/* ================= boot ================= */
function enterApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('treename').textContent=S.nuclei[S.session.nucleusId].treeName;
  document.getElementById('viewingBtn').textContent='viewing as '+person(viewing()).name.split(' ')[0];
  rebuild(); view.s=1; centerOn(viewing()); updateFocusBar();
  if(MODE==='cloud'){ subscribeRealtime(); stampSeen(); }
  document.getElementById('adminBtn').style.display=isSuper()?'flex':'none';
  try{ if(!localStorage.getItem(tutKey()))setTimeout(()=>openTutorial(true),600); }catch(e){} }
const IDLE_MS=3*24*60*60*1000; // 3 quiet days → signed out
function stampSeen(){ if(MODE==='cloud'&&ME.userId)
  try{ localStorage.setItem('bft.lastSeen.'+ME.userId,String(Date.now())); }catch(e){} }
async function boot(){ S=blankState();
  renderLogin(); // always paint immediately — never gate first paint on the network
  if(sb){ try{ const {data}=await Promise.race([ sb.auth.getSession(),
      new Promise(res=>setTimeout(()=>res({data:{session:null}}),4000)) ]);
    if(data&&data.session&&MODE!=='demo'){
      const uid=data.session.user&&data.session.user.id;
      let last=0; try{ last=parseInt(localStorage.getItem('bft.lastSeen.'+uid)||'0',10); }catch(e){}
      if(uid&&last&&Date.now()-last>IDLE_MS){ // away too long — sign out
        try{ localStorage.removeItem('bft.lastSeen.'+uid); await sb.auth.signOut(); }catch(e){}
        renderLogin(); toast("signed out — it's been a few quiet days 🐻");
        return; }
      enterCloud(); } }catch(e){} } }
boot();
window.addEventListener('resize',()=>drawMinimap());
</script>
